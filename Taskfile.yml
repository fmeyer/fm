version: '3'

vars:
  PROJECT: fm
  PROD_URL: https://fernandomeyer.com
  PREVIEW_URL: https://fm-ek0.pages.dev

tasks:
  tikz:
    desc: Pre-render .tex files under content/ to SVG
    cmds:
      - lua scripts/tikz.lua

  post:
    desc: Create a new post
    cmds:
      - lua scripts/post.lua {{.CLI_ARGS}}

  post:tex:
    desc: Add a .tex diagram to a post
    cmds:
      - lua scripts/post_tex.lua {{.CLI_ARGS}}

  serve:
    desc: Start local dev server
    deps: [tikz]
    cmds:
      - zola serve

  build:
    desc: Build site for production
    deps: [tikz]
    cmds:
      - sed -i '' 's|^base_url = .*|base_url = "{{.PROD_URL}}"|' config.toml
      - zola build

  build:preview:
    desc: Build site for Cloudflare Pages preview
    deps: [tikz]
    cmds:
      - sed -i '' 's|^base_url = .*|base_url = "{{.PREVIEW_URL}}"|' config.toml
      - zola build

  deploy:
    desc: Build and deploy to production (fernandomeyer.com)
    cmds:
      - task: build
      - npx wrangler pages deploy public --project-name={{.PROJECT}} --commit-dirty=true

  deploy:preview:
    desc: Build and deploy preview to Cloudflare Pages
    cmds:
      - task: build:preview
      - npx wrangler pages deploy public --project-name={{.PROJECT}} --commit-dirty=true

  clean:
    desc: Remove build output
    cmds:
      - rm -rf public
